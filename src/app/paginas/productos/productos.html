<main id="body">

    @for(producto of productos; track producto.id){

        <div class="tarjeta">

            <div class="contenido">

                <img [src]="producto.imagen" [alt]="producto.nombre">

                <h5>{{ producto.nombre }}</h5>

                <p>
                    {{ producto.descripcion }}
                </p>

                <a href="#" class="btn">
                    Comprar
                </a>

            </div>

        </div>

    }

</main>
